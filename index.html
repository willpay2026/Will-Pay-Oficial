<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will-Pay | Bóveda ADN</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="logonuevo.png">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #ffcf40; --dark-bg: #000; --card-bg: #080808; }
        body, html { margin: 0; padding: 0; background: var(--dark-bg); color: #fff; font-family: 'Lexend', sans-serif; height: 100%; overflow: hidden; }

        /* SPLASH SCREEN - 5 SEGUNDOS */
        #splash-screen {
            position: fixed; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 1s ease-in-out;
        }
        .logo-container { width: 275px; height: 275px; position: relative; overflow: hidden; border-radius: 35px; }
        .logo-img { width: 100%; height: auto; }
        .logo-container::after {
            content: ""; position: absolute; top: -150%; left: -150%; width: 300%; height: 300%;
            background: linear-gradient(to bottom right, transparent 40%, rgba(255,255,255,0.4) 50%, transparent 60%);
            transform: rotate(-45deg); animation: shine 5s infinite;
        }
        @keyframes shine { 0% { top:-150%; left:-150%; } 20% { top:100%; left:100%; } 100% { top:100%; left:100%; } }

        #main-app { display: none; width: 100%; min-height: 100vh; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .login-card { width: 100%; max-width: 420px; background: var(--card-bg); border: 1px solid #1a1500; border-radius: 30px; padding: 35px; text-align: center; margin: 20px auto; }
        
        input, select { width: 100%; padding: 15px; background: #111; border: 1px solid #222; border-radius: 12px; color: #fff; margin-bottom: 10px; text-align: center; font-family: 'Lexend'; font-size: 0.9rem; outline: none; }
        
        /* Estilo para carga de archivos ADN */
        .file-upload { width: 100%; padding: 12px; background: #000; border: 1px dashed #333; border-radius: 12px; color: #888; margin-bottom: 10px; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .file-upload:hover { border-color: var(--gold); color: #fff; }

        .btn-gold { width: 100%; background: var(--gold); border: none; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; font-size: 1rem; }
        
        .privilegio-box { background: rgba(255, 207, 64, 0.05); border: 1px dashed rgba(255, 207, 64, 0.3); border-radius: 15px; padding: 12px; margin-top: 15px; }
        .privilegio-text { color: var(--gold); font-size: 0.65rem; line-height: 1.4; font-style: italic; text-align: left; }

        .wildon-footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255, 207, 64, 0.1); }
        .wildon-text { color: var(--gold); font-size: 0.7rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; display: inline-block; background: linear-gradient(135deg, #d1b13b, #ffcf40, #d1b13b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: textShine 5s infinite; }
        @keyframes textShine { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body onload="arrancarWillPay()">

    <div id="splash-screen">
        <div class="logo-container"><img src="logonuevo.png" class="logo-img"></div>
        <div style="margin-top:20px; color:var(--gold); letter-spacing:4px; font-size:0.8rem; font-weight:bold;">VENEZUELA</div>
    </div>

    <div id="main-app">
        <div id="content-box" class="login-card"></div>
    </div>

    <script>
        // 🧬 BÓVEDA ADN (ARCHIVADOR VIRTUAL)
        const BovedaADN = {
            guardarSocio: (datos) => {
                // Se crea una "carpeta" única en el almacenamiento local usando la cédula
                localStorage.setItem(`Socio_ADN_${datos.cedula}`, JSON.stringify(datos));
                // También lo agregamos a la lista maestra de Wilfredo
                let lista = JSON.parse(localStorage.getItem('WillPay_Socios')) || [];
                lista.push({ nombre: datos.nombre, cedula: datos.cedula, status: 'Pendiente' });
                localStorage.setItem('WillPay_Socios', JSON.stringify(lista));
            }
        };

        function arrancarWillPay() {
            mostrarLogin();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'flex';
                    setTimeout(() => { document.getElementById('main-app').style.opacity = '1'; }, 50);
                }, 1000);
            }, 5000);
        }

        function mostrarLogin() {
            document.getElementById('content-box').innerHTML = `
                <img src="logonuevo.png" style="width: 100px; margin-bottom: 15px;">
                <h2 style="color: var(--gold); font-size: 1.2rem; margin-bottom: 5px;">BIENVENIDO</h2>
                <input type="text" id="user-master" placeholder="Usuario o Teléfono">
                <input type="password" id="pin-master" placeholder="PIN de Seguridad">
                <button class="btn-gold" onclick="intentarAcceso()">ENTRAR</button>
                <p style="margin-top:20px; font-size:0.75rem; color:#444;">
                    ¿Nuevo Socio? <span style="color:var(--gold); cursor:pointer; font-weight:bold;" onclick="mostrarRegistroADN()">Regístrate aquí</span>
                </p>
                <div class="wildon-footer">
                    <span class="wildon-text">Producido por WILDON. C.A.</span>
                </div>
            `;
        }

        function mostrarRegistroADN() {
            document.getElementById('content-box').innerHTML = `
                <h2 style="color: var(--gold); font-size: 1.2rem; margin-bottom: 5px;">🧬 REGISTRO ADN</h2>
                <p style="color: #666; font-size: 0.5rem; letter-spacing: 2px; margin-bottom: 20px;">FUNDACIÓN WILFREDO DONQUIZ</p>
                
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <input type="number" id="reg-cedula" placeholder="Cédula">
                <input type="tel" id="reg-telf" placeholder="Número de Teléfono">
                
                <select id="reg-actividad">
                    <option value="" disabled selected>Actividad Económica</option>
                    <option value="Moto-Taxi">Moto-Taxi</option>
                    <option value="Comercio">Comercio / Negocio</option>
                </select>

                <p style="color: #555; font-size: 0.6rem; text-align: left; margin: 10px 0 5px 5px;">ARCHIVOS ADN (OBLIGATORIO):</p>
                <label class="file-upload">
                    <span>🪪 Foto de Cédula</span>
                    <input type="file" accept="image/*" id="adn-cedula" style="display:none;">
                </label>
                <label class="file-upload">
                    <span>🤳 Selfie de Verificación</span>
                    <input type="file" accept="image/*" id="adn-selfie" style="display:none;">
                </label>

                <button class="btn-gold" onclick="procesarRegistroADN()">UNIRSE A WILL-PAY</button>

                <div class="privilegio-box">
                    <p class="privilegio-text">
                        ✨ <b>PRIVILEGIO DE SOCIO:</b> Al registrarte, gozarás del beneficio de un <b>Historial Certificado</b> para trámites de <b>ISRL</b> y estados de cuenta oficiales.
                    </p>
                </div>

                <p onclick="mostrarLogin()" style="color:#444; font-size:0.7rem; margin-top:15px; cursor:pointer;">VOLVER AL LOGIN</p>
            `;
        }

        function procesarRegistroADN() {
            const nombre = document.getElementById('reg-nombre').value;
            const cedula = document.getElementById('reg-cedula').value;
            const telf = document.getElementById('reg-telf').value;
            const actividad = document.getElementById('reg-actividad').value;
            const fotoCedula = document.getElementById('adn-cedula').files[0];
            const fotoSelfie = document.getElementById('adn-selfie').files[0];

            if(!nombre || !cedula || !telf || !actividad || !fotoCedula || !fotoSelfie) {
                return alert("❌ Jefe, faltan datos o fotos para completar la Carpeta ADN.");
            }

            // Aquí se simula el archivado de los archivos en su "carpeta"
            const datosSocio = {
                nombre, cedula, telf, actividad, 
                fecha: new Date().toLocaleString(),
                carpetaID: `WILDON-ADN-${cedula}`,
                status: "Pendiente de Wilfredo"
            };

            BovedaADN.guardarSocio(datosSocio);
            alert(`✅ ¡ADN ARCHIVADO CORRECTAMENTE!\n\nTu expediente digital ha sido guardado en la Bóveda de WILDON C.A. Wilfredo Donquiz revisará tus fotos para el beneficio ISRL.`);
            mostrarLogin();
        }

        function intentarAcceso() {
            const user = document.getElementById('user-master').value.trim();
            if(user === "WILFREDO-ADMIN") {
                if(typeof mostrarPanelAdmin === 'function') mostrarPanelAdmin();
            } else {
                if(typeof mostrarDashboardUsuario === 'function') mostrarDashboardUsuario();
            }
        }
    </script>
</body>
</html>
