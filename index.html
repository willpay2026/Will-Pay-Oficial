<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will-Pay | El Legado</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --gold: #ffcf40; --dark-bg: #000; --card-bg: #0a0a0a; --border-gold: #ffcf40; }
        body, html { margin: 0; padding: 0; background: var(--dark-bg); color: #fff; font-family: 'Lexend', sans-serif; height: 100vh; overflow: hidden; }

        .view { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; padding: 20px; box-sizing: border-box; position: absolute; top:0; left:0; }

        /* SPLASH */
        #view-splash { display: flex; z-index: 1000; background: #000; }
        .logo-splash { width: 220px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }

        /* CARDS */
        .card { width: 100%; max-width: 360px; background: var(--card-bg); border: 2px solid var(--border-gold); border-radius: 25px; padding: 25px; text-align: center; box-sizing: border-box; }
        
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #444; border-radius: 10px; color: #fff; margin-bottom: 10px; text-align: center; outline: none; font-family: 'Lexend'; }
        .btn-gold { width: 100%; background: var(--gold); border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; font-size: 0.8rem; }
        
        .sello { margin-top: 20px; color: var(--gold); font-size: 0.6rem; letter-spacing: 3px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="view-splash" class="view">
        <img src="logonuevo.png" class="logo-splash">
        <div class="sello" style="position:absolute; bottom:40px;">WILDON. C.A.</div>
    </div>

    <div id="view-login" class="view">
        <img src="logonuevo.png" style="width: 130px; margin-bottom: 20px;">
        <div class="card" id="login-panel">
            <h3 style="color:var(--gold); margin-top:0;">ACCESO OFICIAL</h3>
            <input type="text" id="user" placeholder="Usuario / Teléfono">
            <input type="password" id="pin" placeholder="PIN de Seguridad">
            <button class="btn-gold" onclick="entrar()">ENTRAR AL SISTEMA</button>
            <p style="font-size: 0.7rem; color: #555; margin-top: 15px; cursor: pointer;" onclick="iniciarRegistroADN()">¿No tienes ADN Digital? Regístrate</p>
        </div>
        <div class="sello">WILDON. C.A.</div>
    </div>

    <div id="view-dash" class="view" style="justify-content: flex-start; padding-top: 40px; overflow-y: auto;">
        <div id="content-box" class="card" style="border:none; background:transparent; width:100%;">
            </div>
    </div>

    <script src="modules/socios.js"></script>
    <script src="modules/registro.js"></script>
    <script src="modules/pagos.js"></script>
    <script src="modules/admin.js"></script>

    <script>
        // PROPIEDAD DE NAVEGACIÓN
        function irA(id) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            const target = document.getElementById(id);
            if(target) target.style.display = 'flex';
        }

        window.onload = () => {
            setTimeout(() => { irA('view-login'); }, 3000); 
        };

        // PROPIEDAD DE ACCESO CORREGIDA
        function entrar() {
            const u = document.getElementById('user').value;
            irA('view-dash');

            if(u === "04126602555" || u === "WILFREDO") {
                // Si eres tú, carga el Panel Maestro de admin.js
                window.mostrarPanelAdmin();
            } else {
                // Si es otro, carga el Dashboard de pagos.js
                window.mostrarDashboardUsuario();
            }
        }
    </script>
</body>
</html>
