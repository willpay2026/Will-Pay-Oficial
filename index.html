<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will-Pay | El Legado</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcf40; --dark-bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--dark-bg); color: #fff; font-family: 'Lexend', sans-serif; height: 100%; overflow: hidden; }

        /* 🎬 PANTALLA FLASH (300px con Brillo) */
        #splash-screen {
            position: fixed; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1s;
        }
        .logo-container {
            width: 300px; height: 300px; position: relative;
            overflow: hidden; border-radius: 40px;
        }
        .logo-img { width: 100%; height: auto; }
        .logo-container::after {
            content: ""; position: absolute; top: -150%; left: -150%; width: 300%; height: 300%;
            background: linear-gradient(to bottom right, transparent 45%, rgba(255,255,255,0.6) 50%, transparent 55%);
            transform: rotate(-45deg); animation: shine 6s infinite;
        }
        @keyframes shine { 0% { top:-150%; left:-150%; } 20% { top:100%; left:100%; } 100% { top:100%; left:100%; } }

        /* 🏢 CONTENEDOR PRINCIPAL */
        #main-app { display: none; width: 100%; min-height: 100vh; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .login-card { width: 100%; max-width: 400px; background: #080808; border: 1px solid #1a1500; border-radius: 30px; padding: 35px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        
        input, select { width: 100%; padding: 15px; background: #111; border: 1px solid #222; border-radius: 12px; color: #fff; margin-bottom: 15px; text-align: center; font-family: 'Lexend'; box-sizing: border-box; }
        .btn-gold { width: 100%; background: var(--gold); border: none; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; }

        /* Estilos del Switch Admin */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--gold); }
        input:checked + .slider:before { transform: translateX(24px); }
        .admin-section { background: #111; padding: 15px; border-radius: 15px; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-container"><img src="logonuevo.png" class="logo-img"></div>
        <div style="margin-top:20px; color:var(--gold); letter-spacing:4px; font-size:0.7rem; font-weight:bold;">WILL-PAY VENEZUELA</div>
    </div>

    <div id="main-app">
        <div id="content-box" class="login-card">
            <img src="logonuevo.png" style="width: 100px; margin-bottom: 20px;">
            <h2 style="color: var(--gold); font-size: 1.1rem; margin-bottom: 5px;">ACCESO MAESTRO</h2>
            <p style="color: #444; font-size: 0.6rem; margin-bottom: 25px;">TU BILLETERA DE CONFIANZA</p>
            
            <input type="text" id="user-master" placeholder="Usuario o Teléfono">
            <input type="password" id="pin-master" placeholder="PIN de Seguridad">
            
            <button class="btn-gold" onclick="intentarAcceso()">ENTRAR AL SISTEMA</button>
            
            <p style="margin-top:25px; font-size:0.75rem; color:#555;">
                ¿Nuevo socio? <span style="color:var(--gold); cursor:pointer; font-weight:bold;" onclick="iniciarRegistroADN()">Regístrate aquí</span>
            </p>
        </div>
    </div>

    <script>
        // Lógica de Inicio
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    const main = document.getElementById('main-app');
                    main.style.display = 'flex';
                }, 1000);
            }, 5000); // 5 segundos de Splash como pidió
        };

        // Lógica de Entrada
        function intentarAcceso() {
            const user = document.getElementById('user-master').value.trim();
            if(user === "WILFREDO-ADMIN") {
                if(typeof mostrarPanelAdmin === 'function') {
                    mostrarPanelAdmin();
                } else {
                    alert("Error: modules/admin.js no cargó correctamente.");
                }
            } else {
                alert("Acceso denegado. Solo el dueño tiene acceso al panel maestro.");
            }
        }
    </script>

    <script src="modules/registro.js"></script>
    <script src="modules/admin.js"></script>

</body>
</html>
