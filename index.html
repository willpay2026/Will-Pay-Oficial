<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will-Pay</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcf40;
            --dark-bg: #050505;
            --card-bg: #121212;
            --text: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--dark-bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* LOGO LIMPIO Y CENTRADO */
        .app-header {
            width: 100%;
            padding: 40px 20px 20px 20px;
            text-align: center;
        }

        .app-logo {
            width: 150px; /* Un poco más grande ya que no hay texto */
            height: auto;
            /* Sin bordes, sin sombras, solo tu imagen pura */
        }

        /* CONTENEDOR DE MÓDULOS */
        .container {
            width: 95%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 50px;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #222;
        }

        h2 {
            font-size: 0.85rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 12px;
        }

        button {
            width: 100%;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            color: #333;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <img src="logonuevo.png" alt="Logo" class="app-logo">
    </div>

    <div class="container">
        <div class="app-card" id="render-pagos"></div>

        <div class="app-card" id="render-admin"></div>

        <div class="app-card" id="render-socios"></div>
    </div>

    <div class="footer">
        © 2026 WILL-PAY
    </div>

    <script src="modules/pagos.js"></script>
    <script src="modules/admin.js"></script>
    <script src="modules/socios.js"></script>

</body>
</html>
