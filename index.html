<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --gold: #ffcf40;
            --gold-bright: #ffe082;
            --dark-bg: #050505;
            --card-bg: #121212;
            --text: #ffffff;
            --gray: #888888;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--dark-bg);
            background-image: radial-gradient(circle at top right, #1a1500 0%, #050505 100%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CABECERA CON LOGO ESTILO PREMIUM */
        .app-header {
            width: 100%;
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        .app-logo {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 22px; /* Aquí le quitamos lo cuadrado */
            border: 2px solid var(--gold);
            box-shadow: 0 0 25px rgba(255, 207, 64, 0.4);
            transition: transform 0.3s ease;
        }

        .app-logo:active { transform: scale(0.95); }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            background: linear-gradient(to bottom, var(--gold-bright), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
