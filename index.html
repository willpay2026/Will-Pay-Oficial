<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will-Pay | Oficial</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="logonuevo.png">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100;300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root { --gold: #ffcf40; --dark-bg: #000; --card-bg: #080808; }
        body, html { margin: 0; padding: 0; background: var(--dark-bg); color: #fff; font-family: 'Lexend', sans-serif; height: 100%; overflow: hidden; }

        /* SPLASH SCREEN - LOGO 275PX */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; opacity: 1; transition: opacity 1s ease-in-out;
        }
        .logo-container { width: 275px; height: auto; position: relative; }
        .logo-img { width: 275px; height: auto; display: block; }
        
        .logo-container::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg); animation: shine 5s infinite;
        }
        @keyframes shine { 0% { left: -150%; } 30% { left: 150%; } 100% { left: 150%; } }

        /* APP PRINCIPAL */
        #main-app { 
            display: none; width: 100%; height: 100vh; justify-content: center; align-items: center; 
            padding: 20px; box-sizing: border-box; overflow-y: auto; opacity: 0; transition: opacity 0.8s; background: var(--dark-bg);
        }
        .login-card { width: 100%; max-width: 420px; background: var(--card-bg); border: 1px solid #1a1500; border-radius: 30px; padding: 35px; text-align: center; margin: auto; position: relative; }
        
        input, select { width: 100%; padding: 15px; background: #111; border: 1px solid #222; border-radius: 12px; color: #fff; margin-bottom: 10px; text-align: center; font-family: 'Lexend'; outline: none; box-sizing: border-box; }
        
        .adn-file-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .file-upload { background: #000; border: 1px dashed #333; border-radius: 12px; padding: 15px 5px; color: #666; cursor: pointer; font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; }

        .btn-gold { width: 100%; background: var(--gold); border: none; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; font-size: 1rem; }
        
        .privilegio-box { background: rgba(255, 207, 64, 0.05); border: 1px dashed rgba(255, 207, 64, 0.3); border-radius: 15px; padding: 12px; margin-top: 15px; text-align: left; }
        .privilegio-text { color: var(--gold); font-size: 0.65rem; line-height: 1.4; }

        /* SELLO WILDON C.A. FINO PALO SECO */
        .sello-wildon { margin-top: 30px; padding-top: 15px; border-top: 1px solid #1a1500; color: var(--gold); font-size: 0.7rem; font-weight: 100; letter-spacing: 4px; text-transform: uppercase; opacity: 0.6; }

        /* MODAL PREMIO 500 */
        #premio-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 20000; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .bonus-destello { color: var(--gold); font-size: 3.5rem; font-weight: bold; text-shadow: 0 0 30px var(--gold); animation: pulse 0.8s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-container"><img src="logonuevo.png" class="logo-img"></div>
        <div style="margin-top:20px; color:var(--gold); letter-spacing:6px; font-size:0.9rem; font-weight:bold;">VENEZUELA</div>
    </div>

    <div id="main-app">
        <div id="content-box" class="login-card"></div>
    </div>

    <div id="premio-modal">
        <h1 style="color: white; letter-spacing: 2px;">¡SORPRESA SOCIO!</h1>
        <div class="bonus-destello">+ 500</div>
        <p style="color: var(--gold); margin-top: 20px; padding: 0 20px;">Bono de Bienvenida Fundación Wilfredo Donquiz por ser de los primeros 5 socios oficiales.</p>
        <button class="btn-gold" style="width: auto; padding: 15px 40px; margin-top: 30px;" onclick="cerrarPremio()">RECIBIR SALDO</button>
    </div>

    <script>
        window.onload = function() {
            mostrarLogin();
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const main = document.getElementById('main-app');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    main.style.display = 'flex';
                    setTimeout(() => { main.style.opacity = '1'; }, 50);
                }, 1000);
            }, 5000);
        };

        const footerSello = `<div class="sello-wildon">WILDON. C.A.</div>`;

        function mostrarLogin() {
            document.getElementById('content-box').innerHTML = `
                <img src="logonuevo.png" style="width: 140px; margin-bottom: 20px;">
                <h2 style="color: var(--gold); font-size: 1.2rem; margin-bottom: 5px;">BIENVENIDO</h2>
                <input type="text" id="user-master" placeholder="Usuario o Teléfono">
                <input type="password" id="pin-master" placeholder="PIN de Seguridad">
                <button class="btn-gold" onclick="intentarAcceso()">ENTRAR</button>
                <p style="margin-top:20px; font-size:0.75rem; color:#444;">
                    ¿Nuevo Socio? <span style="color:var(--gold); cursor:pointer; font-weight:bold;" onclick="mostrarRegistroADN()">Regístrate aquí</span>
                </p>
                ${footerSello}
            `;
        }

        function mostrarRegistroADN() {
            document.getElementById('content-box').innerHTML = `
                <img src="logonuevo.png" style="width: 140px; margin-bottom: 15px;">
                <h2 style="color: var(--gold); font-size: 1.1rem;">🧬 REGISTRO ADN</h2>
                <p style="color: #666; font-size: 0.5rem; letter-spacing: 2px; margin-bottom: 15px;">FUNDACIÓN WILFREDO DONQUIZ</p>
                
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <input type="number" id="reg-cedula" placeholder="Cédula de Identidad">
                <input type="tel" id="reg-telf" placeholder="Número de Teléfono">
                
                <select id="reg-actividad">
                    <option value="Independiente">Particular / Independiente</option>
                    <option value="Moto-Taxi">Moto-Taxi</option>
                    <option value="Comercio">Comercio</option>
                </select>

                <input type="password" id="reg-pin" placeholder="Crea tu PIN de Seguridad (4-6 dígitos)" maxlength="6">

                <div class="adn-file-container">
                    <label class="file-upload"><span>📸 CÉDULA</span><input type="file" accept="image/*" style="display:none;"></label>
                    <label class="file-upload"><span>🤳 SELFIE ADN</span><input type="file" accept="image/*" style="display:none;"></label>
                </div>

                <button class="btn-gold" onclick="procesarPrimerosSocios()">UNIRSE A WILL-PAY</button>

                <div class="privilegio-box">
                    <p class="privilegio-text">
                        ✨ <b>PRIVILEGIO DE USUARIO:</b> Al registrarte con alguna actividad económica gozarás del beneficio de un <b>Historial Certificado</b> para cualquier tipo de trámites.
                    </p>
                </div>

                <p onclick="mostrarLogin()" style="color:#444; font-size:0.7rem; margin-top:15px; cursor:pointer;">VOLVER</p>
                ${footerSello}
            `;
        }

        function procesarPrimerosSocios() {
            let contador = parseInt(localStorage.getItem('WillPay_Contador')) || 0;
            const pin = document.getElementById('reg-pin').value;
            
            if(!pin) return alert("Socio, debe crear un PIN para su seguridad.");

            contador++;
            localStorage.setItem('WillPay_Contador', contador);

            if(contador <= 5) {
                // DISPARAR EL CONFETI DORADO
                document.getElementById('premio-modal').style.display = 'flex';
                confetti({
                    particleCount: 200,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#ffcf40', '#ffffff', '#d1b13b']
                });
            } else {
                alert("✅ Registro Exitoso. Expediente ADN Archivador WILDON C.A.");
                mostrarLogin();
            }
        }

        function cerrarPremio() {
            document.getElementById('premio-modal').style.display = 'none';
            mostrarLogin();
        }

        function intentarAcceso() {
            const user = document.getElementById('user-master').value.trim();
            if(user === "WILFREDO-ADMIN") {
                if(typeof mostrarPanelAdmin === 'function') mostrarPanelAdmin();
                else alert("Acceso Maestro: Bienvenido Wilfredo.");
            } else {
                if(typeof mostrarDashboardUsuario === 'function') mostrarDashboardUsuario();
                else alert("Bienvenido a Will-Pay.");
            }
        }
    </script>
    <script src="modules/admin.js"></script>
    <script src="modules/pagos.js"></script>
</body>
</html>
