<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will-Pay | Panel Maestro</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcf40; --dark-bg: #000; --card-bg: #0a0a0a; --border-gold: #ffcf40; --red-panic: #ff0000; }
        body, html { margin: 0; padding: 0; background: var(--dark-bg); color: #fff; font-family: 'Lexend', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        /* DISEÑO RESPONSIVO */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .grid-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        
        /* CABECERA Y BOTON PANICO */
        .header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; position: relative; }
        .btn-panic { background: var(--red-panic); color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px var(--red-panic); margin-bottom: 10px; width: 100%; }
        
        /* CASILLAS DE PORCENTAJE */
        .config-bar { display: flex; justify-content: space-around; background: #111; padding: 10px; border-radius: 10px; margin-top: 10px; flex-wrap: wrap; }
        .pct-box { text-align: center; margin: 5px; }
        .pct-box input { width: 60px; background: #000; border: 1px solid var(--gold); color: var(--gold); text-align: center; border-radius: 5px; font-size: 1rem; }

        /* SALDO GIGANTE */
        .saldo-unificado { background: #000; border: 4px solid var(--gold); border-radius: 15px; padding: 30px; text-align: center; margin-bottom: 20px; }
        .saldo-unificado h1 { font-size: 3rem; margin: 10px 0; color: #fff; }

        /* MINI BUNKERS DERECHA */
        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .stat-card { background: var(--card-bg); border-left: 4px solid var(--gold); padding: 15px; border-radius: 5px; }
        .stat-card.neto { border-left-color: #00ff00; }

        /* FORMULARIO RECARGA DIRECTA */
        .form-recarga { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-top: 20px; }
        .form-recarga input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        
        /* SWITCHES */
        .switch-container { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #1a1a1a; border-radius: 8px; margin: 5px 0; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00ff00; }
        input:checked + .slider:before { transform: translateX(26px); }

        /* TABLA ACTIVIDAD */
        .table-container { overflow-x: auto; margin-top: 30px; background: #0a0a0a; border: 1px solid #222; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #111; color: var(--gold); padding: 12px; text-align: left; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .btn-aprobar { background: #008000; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
