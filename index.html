<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Official System</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
        }
        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .app-container { max-width: 500px; width: 100%; }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--gold); padding-bottom: 15px; }
        header h1 { color: var(--gold); margin: 0; font-size: 2.2rem; }
        
        /* Contenedores de los Módulos */
        .module-section {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        h2 { color: var(--gold); font-size: 1.2rem; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .footer-legacy { text-align: center; font-size: 0.8rem; color: #666; margin-top: 40px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>WILL-PAY</h1>
        <small>Legado de Wilfredo Donquiz para Wilyanny</small>
    </header>

    <div id="modulo-pagos-container" class="module-section">
        <h2>💳 Módulo de Pagos</h2>
        <div id="render-pagos">Cargando sistema de seguridad...</div>
    </div>

    <div id="modulo-admin-container" class="module-section">
        <h2>🛠️ Panel Maestro</h2>
        <div id="render-admin">Iniciando panel de control...</div>
    </div>

    <div id="modulo-socios-container" class="module-section">
        <h2>👥 Gestión de Socios</h2>
        <div id="render-socios">Verificando cupos reservados...</div>
    </div>

    <footer class="footer-legacy">
        Will-Pay © 2026 | Revolución en Pagos Regionales
    </footer>
</div>

<script src="modules/pagos.js"></script>
<script src="modules/admin.js"></script>
<script src="modules/socios.js"></script>

</body>
</html>
