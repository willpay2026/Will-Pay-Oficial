<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will-Pay | El Legado</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100;300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --gold: #ffcf40; --dark-bg: #000; --card-bg: #080808; }
        body, html { margin: 0; padding: 0; background: var(--dark-bg); color: #fff; font-family: 'Lexend', sans-serif; height: 100%; overflow: hidden; }

        /* SPLASH */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: opacity 1s; }
        .logo-img { width: 275px; height: auto; }

        /* APP */
        #main-app { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.8s; overflow-y: auto; }
        .card { width: 90%; max-width: 400px; background: var(--card-bg); border: 1px solid #1a1500; border-radius: 30px; padding: 30px; text-align: center; margin: auto; box-sizing: border-box; }

        input { width: 100%; padding: 15px; background: #111; border: 1px solid #222; border-radius: 12px; color: #fff; margin-bottom: 12px; text-align: center; font-family: 'Lexend'; box-sizing: border-box; outline: none; }
        .btn-gold { width: 100%; background: var(--gold); border: none; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; }

        /* DASHBOARD RECTIFICADO */
        .wallet-balance { font-size: 2.8rem; font-weight: 700; color: var(--gold); margin-bottom: 20px; }
        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .btn-action { background: #0a0a0a; border: 1px solid #222; padding: 25px 10px; border-radius: 20px; color: #fff; cursor: pointer; text-align: center; }

        /* ESCÁNER (PAGAR) */
        #reader-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; flex-direction: column; }
        #reader { width: 100% !important; height: 70% !important; }

        /* COMPROBANTE */
        .receipt-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 6000; justify-content: center; align-items: center; padding: 20px; }
        .receipt-card { background: #fff; color: #000; width: 100%; max-width: 350px; border-radius: 20px; padding: 25px; text-align: center; }

        .sello-wildon { margin-top: 30px; padding-top: 15px; border-top: 1px solid #1a1500; color: var(--gold); font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="logonuevo.png" class="logo-img">
        <div style="margin-top:20px; color:var(--gold); letter-spacing:6px; font-weight:bold;">VENEZUELA</div>
    </div>

    <div id="reader-container">
        <div id="reader"></div>
        <button class="btn-gold" style="margin: 20px; background: #ff4444; color: white;" onclick="cerrarEscaner()">CANCELAR</button>
    </div>

    <div id="receipt-overlay" class="receipt-overlay">
        <div class="receipt-card">
            <img src="logonuevo.png" style="width: 50px;">
            <h2 style="margin: 10px 0;">PAGO EXITOSO</h2>
            <div id="receipt-content" style="text-align: left; font-size: 0.8rem; margin: 15px 0; border-top: 1px dashed #ccc; padding-top: 10px;"></div>
            <button class="btn-gold" onclick="location.reload()">FINALIZAR</button>
        </div>
    </div>

    <div id="main-app">
        <div id="content-box" class="card"></div>
    </div>

    <script>
        let saldoActual = parseFloat(localStorage.getItem('WPay_Saldo')) || 0;
        let nombreSocio = localStorage.getItem('WPay_Nombre') || "Socio";
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        window.onload = () => {
            mostrarLogin();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'flex';
                    setTimeout(() => document.getElementById('main-app').style.opacity = '1', 50);
                }, 1000);
            }, 5000);
        };

        function mostrarLogin() {
            document.getElementById('content-box').innerHTML = `
                <img src="logonuevo.png" style="width: 140px; margin-bottom: 20px;">
                <input type="text" id="u-login" placeholder="Usuario / Teléfono">
                <input type="password" id="p-login" placeholder="PIN">
                <button class="btn-gold" onclick="entrar()">ENTRAR</button>
                <p style="font-size:0.8rem; margin-top:15px;">¿Nuevo? <span style="color:var(--gold); cursor:pointer;" onclick="mostrarRegistro()">Regístrate</span></p>
                <div class="sello-wildon">WILDON. C.A.</div>
            `;
        }

        function mostrarDashboard() {
            document.getElementById('content-box').innerHTML = `
                <img src="logonuevo.png" style="width: 80px; margin-bottom: 10px;">
                <div style="font-size:0.7rem; color:#666; letter-spacing:2px;">DISPONIBLE</div>
                <div class="wallet-balance">$ ${saldoActual.toFixed(2)}</div>
                <div class="actions-grid">
                    <div class="btn-action" onclick="abrirEscaner()">🚀<br>PAGAR</div>
                    <div class="btn-action" onclick="mostrarCobrar()">📥<br>COBRAR</div>
                </div>
                <button class="btn-gold" style="margin-top:20px; background:transparent; color:#444; border:1px solid #222;" onclick="mostrarLogin()">SALIR</button>
                <div class="sello-wildon">WILDON. C.A.</div>
            `;
        }

        // --- 📥 COBRAR (GENERA QR + MONTO) ---
        function mostrarCobrar() {
            document.getElementById('content-box').innerHTML = `
                <h3 style="color:var(--gold)">GENERAR COBRO</h3>
                <input type="number" id="monto-cobro" placeholder="Monto a Recibir ($)" oninput="actualizarQR()">
                <div id="qr-space" style="background:#fff; padding:15px; border-radius:15px; display:inline-block; margin:15px 0;">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=WPay-User" id="qr-img" style="width:180px;">
                </div>
                <p style="font-size:0.7rem; color:#666;">Indica el monto y muestra el código</p>
                <button class="btn-gold" onclick="mostrarDashboard()">VOLVER</button>
                <div class="sello-wildon">WILDON. C.A.</div>
            `;
        }

        function actualizarQR() {
            const monto = document.getElementById('monto-cobro').value || "0";
            const qrImg = document.getElementById('qr-img');
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=WP|${nombreSocio}|${monto}`;
        }

        // --- 🚀 PAGAR (ABRE CÁMARA PARA ESCANEAR) ---
        let scanner;
        function abrirEscaner() {
            document.getElementById('reader-container').style.display = 'flex';
            scanner = new Html5Qrcode("reader");
            scanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                (text) => {
                    playBeep();
                    generarRecibo(text);
                }
            ).catch(err => alert("Error al abrir cámara"));
        }

        function cerrarEscaner() {
            if(scanner) scanner.stop().then(() => {
                document.getElementById('reader-container').style.display = 'none';
            });
        }

        function playBeep() {
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.frequency.value = 880;
            osc.start();
            setTimeout(() => osc.stop(), 150);
        }

        function generarRecibo(datos) {
            cerrarEscaner();
            const info = datos.split('|'); // WP | Socio | Monto
            const receptor = info[1] || "Comercio";
            const monto = info[2] || "0.00";
            
            document.getElementById('receipt-content').innerHTML = `
                <b>ID:</b> WP-${Math.floor(Math.random()*99999)}<br>
                <b>FECHA:</b> ${new Date().toLocaleString()}<br>
                <b>RECEPTOR:</b> ${receptor}<br>
                <b>MONTO:</b> <span style="font-size:1.2rem; color:green;">$ ${parseFloat(monto).toFixed(2)}</span>
            `;
            document.getElementById('receipt-overlay').style.display = 'flex';
        }

        function entrar() {
            const u = document.getElementById('u-login').value;
            if(u === "WILFREDO-ADMIN") alert("Bienvenido Jefe Wilfredo.");
            mostrarDashboard();
        }

        function mostrarRegistro() {
            document.getElementById('content-box').innerHTML = `
                <h2 style="color:var(--gold)">REGISTRO ADN</h2>
                <input type="text" id="r-nom" placeholder="Nombre">
                <input type="password" id="r-pin" placeholder="PIN">
                <button class="btn-gold" onclick="completarRegistro()">REGISTRAR</button>
                <div class="sello-wildon">WILDON. C.A.</div>
            `;
        }

        function completarRegistro() {
            const nom = document.getElementById('r-nom').value;
            localStorage.setItem('WPay_Nombre', nom);
            localStorage.setItem('WPay_Saldo', 500); // Bono automático
            saldoActual = 500;
            nombreSocio = nom;
            confetti({ particleCount: 150 });
            mostrarDashboard();
        }
    </script>
</body>
</html>
