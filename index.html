<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will-Pay | El Legado</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --gold: #ffcf40; --dark-bg: #000; --card-bg: #0a0a0a; --border-gold: #ffcf40; }
        body, html { margin: 0; padding: 0; background: var(--dark-bg); color: #fff; font-family: 'Lexend', sans-serif; height: 100%; overflow-x: hidden; }

        /* VISTAS */
        .view { display: none; flex-direction: column; align-items: center; padding: 20px; width: 100%; min-height: 100vh; box-sizing: border-box; }

        /* SPLASH SCREEN (BLOQUE 1) */
        #view-splash { display: flex; justify-content: center; background: #000; }
        .logo-splash { width: 250px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        /* CARDS CORPORATIVAS (BORDES BIEN MARCADOS) */
        .card { 
            width: 100%; max-width: 380px; background: var(--card-bg); 
            border: 2px solid var(--border-gold); border-radius: 30px; 
            padding: 25px; text-align: center; box-sizing: border-box; 
            margin-top: 10px; position: relative;
        }

        /* INPUTS Y BOTONES */
        input { 
            width: 100%; padding: 14px; background: #111; border: 1px solid #444; 
            border-radius: 12px; color: #fff; margin-bottom: 12px; text-align: center; 
            outline: none; font-family: 'Lexend'; font-size: 0.9rem;
        }
        input:focus { border-color: var(--gold); }

        .btn-gold { 
            width: 100%; background: var(--gold); border: none; padding: 16px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; 
            text-transform: uppercase; font-size: 0.85rem; transition: 0.3s;
        }
        .btn-gold:active { transform: scale(0.98); }

        .btn-action { 
            background: #000; border: 2px solid var(--border-gold); padding: 18px; 
            border-radius: 18px; color: #fff; cursor: pointer; font-size: 0.75rem; 
            font-weight: bold; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }

        /* TABLERO CEO (EL DE TU IMAGEN) */
        .ceo-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 15px; }
        .ceo-stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; }
        .stat-item { background: #050505; border: 1px solid var(--gold); border-radius: 12px; padding: 15px; text-align: center; }
        .stat-item small { color: var(--gold); font-size: 0.6rem; display: block; margin-bottom: 5px; }
        .stat-item b { font-size: 1rem; color: #fff; }

        /* RECUADRO DE RECARGA PENDIENTE (DISEÑO VERDE) */
        .pending-box { 
            background: #000; border: 1px solid #222; border-radius: 15px; 
            padding: 15px; display: flex; justify-content: space-between; 
            align-items: center; margin-top: 10px; 
        }
        .btn-approve { background: #00ff00; color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* ESCÁNER Y COMPROBANTE */
        #reader-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; }
        .receipt-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 6000; justify-content: center; align-items: center; 
        }
        .receipt-card { 
            background: #fff; color: #000; width: 85%; max-width: 320px; 
            border-radius: 20px; padding: 25px; text-align: center; border: 5px double #000;
        }

        .sello-footer { margin-top: 25px; color: var(--gold); font-size: 0.6rem; letter-spacing: 4px; opacity: 0.8; text-transform: uppercase; }
        .logout-link { color: #ff4444; margin-top: 30px; cursor: pointer; font-size: 0.8rem; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

        <img src="logonuevo.png" class="logo-splash">
        <div class="sello-footer" style="position: absolute; bottom: 40px;">WILDON. C.A.</div>
    </div>

    <div id="view-login" class="view">
        <img src="logonuevo.png" style="width: 130px; margin-bottom: 20px;">
        <div class="card">
            <h3 style="color:var(--gold); letter-spacing: 1px;">DNA DE ACCESO</h3>
            <input type="text" id="user-in" placeholder="ID Socio / Teléfono">
            <input type="password" id="pass-in" placeholder="PIN de Seguridad">
            <button class="btn-gold" onclick="autenticar()">ENTRAR AL SISTEMA</button>
            <p style="font-size: 0.7rem; margin-top: 15px; color: #555;">REGISTRO ADN DISPONIBLE EN AGENCIAS</p>
        </div>
        <div class="sello-footer">WILDON. C.A.</div>
    </div>

    <div id="view-socio" class="view">
        <img src="logonuevo.png" style="width: 100px; margin-bottom: 10px;">
        <div class="card">
            <div style="font-size: 0.7rem; color: #888;">SALDO DISPONIBLE</div>
            <h1 style="color:var(--gold); font-size: 2.5rem; margin: 5px 0;" id="txt-saldo">Bs. 500.00</h1>
            <div style="font-size: 0.8rem; margin-bottom: 20px;" id="txt-nombre">SOCIO ACTIVO</div>
            
            <div style="display:flex; gap:12px; margin-bottom:20px;">
                <button class="btn-action" onclick="abrirVistaPago()">🚀<br>PAGAR</button>
                <button class="btn-action" onclick="abrirEscanerCobro()">📥<br>COBRAR</button>
            </div>

            <button class="btn-gold" style="background:transparent; border:1px solid #333; color:#777;" onclick="abrirVistaRecarga()">+ SOLICITAR RECARGA</button>
        </div>
