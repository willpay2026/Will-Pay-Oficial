<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will-Pay | El Legado</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --gold: #ffcf40; --dark-bg: #000; --card-bg: #0a0a0a; --border-gold: #ffcf40; }
        body, html { margin: 0; padding: 0; background: var(--dark-bg); color: #fff; font-family: 'Lexend', sans-serif; height: 100vh; overflow: hidden; }
        .view { display: none; flex-direction: column; align-items: center; width: 100%; height: 100vh; padding: 20px; box-sizing: border-box; position: absolute; top:0; left:0; }
        #view-splash { display: flex; z-index: 1000; background: #000; justify-content: center; align-items: center; }
        .logo-splash { width: 220px; }
        .login-container { width: 100%; max-width: 360px; text-align: center; margin-top: 20px; }
        input { 
            width: 100%; padding: 15px; background: #0a0a0a; border: none; 
            border-bottom: 1.5px solid #333; border-radius: 0; color: #fff; 
            margin-bottom: 20px; text-align: center; outline: none; 
            font-family: 'Lexend'; font-size: 1.1rem; transition: 0.3s;
        }
        input:focus { border-bottom-color: var(--gold); background: #111; }
        .btn-gold { 
            width: 100%; background: var(--gold); border: none; padding: 18px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; color: #000; 
            text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(255, 207, 64, 0.2);
        }
        .btn-gold:disabled { background: #555; cursor: wait; }
        .sello { margin-top: 30px; color: var(--gold); font-size: 0.6rem; letter-spacing: 4px; opacity: 0.7; font-weight: bold; }
        #content-box { width: 100%; max-width: 450px; margin: 0 auto; }
        .fadeIn { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="view-splash" class="view">
        <img src="logonuevo.png" class="logo-splash">
        <div class="sello" style="position:absolute; bottom:40px;">WILDON. C.A.</div>
    </div>

    <div id="view-login" class="view" style="justify-content: center;">
        <img src="logonuevo.png" style="width: 150px; margin-bottom: 40px;">
        <div class="login-container">
            <h2 style="color:var(--gold); margin-bottom: 30px; font-weight: 300; letter-spacing: 2px;">ACCESO</h2>
            <input type="text" id="user" placeholder="Usuario / Teléfono">
            <input type="password" id="pin" placeholder="PIN de Seguridad">
            <button id="btn-entrar" class="btn-gold" onclick="entrar()">ENTRAR AL SISTEMA</button>
            
            <p style="font-size: 0.75rem; color: #555; margin-top: 30px; cursor: pointer;" onclick="irARegistro()">¿No tienes ADN Digital? <span style="color:var(--gold)">Regístrate</span></p>
        </div>
        <div class="sello">WILDON. C.A.</div>
    </div>

    <div id="view-dash" class="view" style="justify-content: flex-start; padding-top: 30px; overflow-y: auto;">
        <div id="content-box" class="fadeIn"></div>
    </div>

    <script src="modules/socios.js"></script>
    <script src="modules/registro.js"></script>
    <script src="modules/pagos.js"></script>
    <script src="modules/admin.js"></script>

    <script>
        function irA(id) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            const target = document.getElementById(id);
            if(target) target.style.display = 'flex';
        }

        window.onload = () => {
            setTimeout(() => { irA('view-login'); }, 4000); 
        };

        // LÓGICA DE ACCESO REAL CONECTADA AL SERVER.JS
        async function entrar() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pin').value.trim();
            const btn = document.getElementById('btn-entrar');

            if (u === "" || p === "") {
                alert("Por favor, ingrese su ADN Digital completo.");
                return;
            }

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            try {
                // LLAMADA AL SERVIDOR QUE CREAMOS EN RENDER
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: u, pin: p })
                });

                const data = await response.json();

                if (data.success) {
                    // Si el login es exitoso, guardamos los datos del socio
                    localStorage.setItem('usuario_activo', JSON.stringify(data.usuario));
                    irA('view-dash');

                    // Verificamos si es Wilfredo (ADMIN) o un Socio
                    if (data.usuario.rol === 'ADMIN') {
                        if(window.mostrarPanelMaestro) window.mostrarPanelMaestro();
                    } else {
                        if(window.mostrarDashboardUsuario) window.mostrarDashboardUsuario();
                    }
                } else {
                    alert("ERROR: " + data.message);
                    btn.innerText = "ENTRAR AL SISTEMA";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Conectando con el búnker... Intenta de nuevo en 5 segundos.");
                btn.innerText = "ENTRAR AL SISTEMA";
                btn.disabled = false;
            }
        }

        function irARegistro() {
            irA('view-dash');
            if(window.iniciarRegistroADN) {
                window.iniciarRegistroADN();
            } else {
                document.getElementById('content-box').innerHTML = `
                    <div style="text-align:center; padding:20px;">
                        <h2 style='color:var(--gold)'>REGISTRO DE ADN</h2>
                        <p style="color:#555">Estamos activando los nuevos nodos.</p>
                        <button class='btn-gold' style="margin-top:20px" onclick='location.reload()'>VOLVER</button>
                    </div>`;
            }
        }
    </script>
</body>
</html>
