<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will-Pay | El Legado de Wilfredo</title>
    <style>
        :root {
            --gold: #ffcf40;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background: radial-gradient(circle at top, #1a1a1a, #000);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* DISEÑO DEL LOGO PROFESIONAL */
        .logo-container {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .app-logo {
            width: 120px; /* Tamaño ideal para móvil */
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 207, 64, 0.4));
            border-radius: 15px; /* Por si tu logo es cuadrado, le da un toque moderno */
        }

        .header h1 {
            color: var(--gold);
            font-size: 2.2rem;
            margin: 5px 0;
            text-shadow: 0 0 10px rgba(255, 207, 64, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        /* El Mensaje Mágico */
        .legacy-box {
            background: rgba(255, 207, 64, 0.05);
            border: 1px solid rgba(255, 207, 64, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
            max-width: 380px;
        }

        .legacy-box p {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #ccc;
        }

        /* Tarjetas de la App */
        .app-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #222;
            box-sizing: border-box;
        }

        h2 {
            font-size: 1rem;
            color: var(--gold);
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        /* Botones e Inputs */
        button {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            background: var(--gold);
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #444;
            text-align: center;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logonuevo.png" alt="Will-Pay Logo" class="app-logo">
    </div>

    <div class="header">
        <h1>Will-Pay</h1>
        <div class="tagline">TECNOLOGÍA VENEZOLANA</div>
    </div>

    <div class="legacy-box">
        <p>
            "Nacido de un emprendedor que pensó en su región y en revolucionar el sistema de pagos con una idea simple y código honesto."
        </p>
    </div>

    <div class="app-card" id="render-pagos"></div>
    <div class="app-card" id="render-admin"></div>
    <div class="app-card" id="render-socios"></div>

    <div class="footer">
        PROPIEDAD DE WILFREDO DONQUIZ © 2026<br>
        EL LEGADO DE WILYANNY DONQUIZ
    </div>

    <script src="modules/pagos.js"></script>
    <script src="modules/admin.js"></script>
    <script src="modules/socios.js"></script>

</body>
</html>
