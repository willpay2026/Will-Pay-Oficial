<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will-Pay | El Legado</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --gold: #ffcf40; --dark-bg: #000; --card-bg: #0a0a0a; --border-gold: #ffcf40; }
        body, html { margin: 0; padding: 0; background: var(--dark-bg); color: #fff; font-family: 'Lexend', sans-serif; height: 100vh; overflow: hidden; }

        /* VISTAS */
        .view { display: none; flex-direction: column; align-items: center; width: 100%; height: 100vh; padding: 20px; box-sizing: border-box; position: absolute; top:0; left:0; }

        /* SPLASH */
        #view-splash { display: flex; z-index: 1000; background: #000; justify-content: center; }
        .logo-splash { width: 220px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }

        /* FORMULARIOS Y BOTONES (SIN RECUADRO ENCAPSULADOR) */
        .login-box { width: 100%; max-width: 360px; text-align: center; margin-top: 20px; }
        
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 15px; text-align: center; outline: none; font-family: 'Lexend'; font-size: 1rem; }
        input:focus { border-color: var(--gold); }

        .btn-gold { width: 100%; background: var(--gold); border: none; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        
        .sello { margin-top: 30px; color: var(--gold); font-size: 0.6rem; letter-spacing: 4px; opacity: 0.7; font-weight: bold; }

        /* CONTENEDOR DINÁMICO TOTAL */
        #content-box { width: 100%; max-width: 450px; margin: 0 auto; }
    </style>
</head>
<body>

    <div id="view-splash" class="view">
        <img src="logonuevo.png" class="logo-splash">
        <div class="sello" style="position:absolute; bottom:40px;">WILDON. C.A.</div>
    </div>

    <div id="view-login" class="view" style="justify-content: center;">
        <img src="logonuevo.png" style="width: 140px; margin-bottom: 30px;">
        
        <div class="login-box" id="login-panel">
            <h2 style="color:var(--gold); margin-bottom: 20px; font-weight: 300;">ACCESO OFICIAL</h2>
            <input type="text" id="user" placeholder="Usuario / Teléfono">
            <input type="password" id="pin" placeholder="PIN de Seguridad">
            <button class="btn-gold" onclick="entrar()">ENTRAR AL SISTEMA</button>
            <p style="font-size: 0.75rem; color: #666; margin-top: 25px; cursor: pointer;" onclick="iniciarRegistroADN()">¿No tienes ADN Digital? <span style="color:var(--gold)">Regístrate</span></p>
        </div>

        <div class="sello">WILDON. C.A.</div>
    </div>

    <div id="view-dash" class="view" style="justify-content: flex-start; padding-top: 30px; overflow-y: auto;">
        <div id="content-box">
            </div>
    </div>

    <script src="modules/socios.js"></script>
    <script src="modules/registro.js"></script>
    <script src="modules/pagos.js"></script>
    <script src="modules/admin.js"></script>

    <script>
        function irA(id) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            const target = document.getElementById(id);
            if(target) target.style.display = 'flex';
        }

        window.onload = () => {
            setTimeout(() => { irA('view-login'); }, 3000); 
        };

        function entrar() {
            const u = document.getElementById('user').value;
            irA('view-dash');

            // Lógica de detección de Maestro o Socio
            if(u === "04126602555" || u === "WILFREDO") {
                window.mostrarPanelAdmin();
            } else {
                window.mostrarDashboardUsuario();
            }
        }
    </script>
</body>
</html>
