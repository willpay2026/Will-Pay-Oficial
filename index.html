<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will-Pay | El Legado</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffcf40; 
            --dark-bg: #000000; 
        }

        body, html { 
            margin: 0; padding: 0; background: var(--dark-bg); 
            color: #fff; font-family: 'Lexend', sans-serif; height: 100%; overflow-x: hidden;
        }

        /* 🎬 PANTALLA FLASH (SPLASH) */
        #splash-screen {
            position: fixed; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1.5s ease;
        }

        .logo-container {
            position: relative; width: 300px; height: 300px;
            overflow: hidden; border-radius: 40px; 
            display: flex; justify-content: center; align-items: center;
        }

        .logo-img { width: 95%; height: auto; display: block; }

        .logo-container::after {
            content: ""; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0) 45%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 55%, rgba(255,255,255,0) 100%);
            transform: rotate(-45deg); animation: slowShine 7s infinite;
        }

        @keyframes slowShine {
            0% { top: -150%; left: -150%; }
            15% { top: 100%; left: 100%; }
            100% { top: 100%; left: 100%; }
        }

        .loader-ring {
            width: 50px; height: 50px; border: 3px solid rgba(255, 207, 64, 0.1);
            border-top: 3px solid var(--gold); border-radius: 50%;
            animation: spin 1.2s linear infinite; margin: 25px 0;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 🖥️ PANELES */
        #main-container {
            display: none; width: 100%; min-height: 100vh;
            justify-content: center; align-items: center; opacity: 0;
            transition: opacity 1.2s ease; padding: 20px; box-sizing: border-box;
        }

        .login-card {
            width: 100%; max-width: 400px; background: #080808;
            border: 1px solid #1a1500; border-radius: 30px;
            padding: 30px; text-align: center;
